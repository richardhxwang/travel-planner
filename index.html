.tab-enter-active, .tab-leave-active { transition: all 0.2s ease; position: absolute; width: 100%; }

/* Timeline dot */
.t-dot { position: absolute; width: 14px; height: 14px; border-radius: 50%; border: 2.5px solid; z-index: 2; }

===================================================== */
async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const mat = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
    mat, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']
  );
}
async function encryptData(key, data) {
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const enc = new TextEncoder();
  const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, enc.encode(JSON.stringify(data)));
  const buf = new Uint8Array(12 + ct.byteLength);
  buf.set(iv); buf.set(new Uint8Array(ct), 12);
  return btoa(String.fromCharCode(...buf));
}
async function decryptData(key, b64) {
  const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  const dec = new TextDecoder();
  const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: bytes.slice(0,12) }, key, bytes.slice(12));
  return JSON.parse(dec.decode(plain));
}

function formatDate(s) {
  if (!s) return '';
  const d = new Date(s + 'T12:00:00');
  return d.toLocaleDateString('zh-CN', { month:'long', day:'numeric', weekday:'short' });
}
function formatDateShort(s) {
  if (!s) return '';
  const d = new Date(s + 'T12:00:00');
  const wd = ['日','一','二','三','四','五','六'];
  return `${d.getMonth()+1}/${d.getDate()} 周${wd[d.getDay()]}`;
}
function formatTs(ts) {
  return new Date(ts).toLocaleString('zh-CN',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
}
function findActivity(trip, activityId) {
  for (const day of trip.days) {
    const idx = day.activities.findIndex(a => a.id === activityId);
    if (idx !== -1) return { day, act: day.activities[idx], idx };
  }
  return null;
}
function tcArgSummary(argsStr) {
  try {
    const p = JSON.parse(argsStr || '{}');
    const entries = Object.entries(p).slice(0, 2);
    return entries.map(([k,v]) => {
      const vs = typeof v === 'string' ? v : JSON.stringify(v);
      return `${k}: ${vs.slice(0, 20)}`;
    }).join('  ');
  } catch { return ''; }
}

    /* =====================================================

    async function doSetup() {
      if (setupPw.value.length < 4) { setupErr.value = '密码至少需要4位'; return; }
      if (setupPw.value !== setupPw2.value) { setupErr.value = '两次密码不一致'; return; }
      setupErr.value = '';
      const s = crypto.getRandomValues(new Uint8Array(16));
      saltArr.value = s;
      localStorage.setItem('tp_salt', arrToB64(s));
      masterKey.value = await deriveKey(setupPw.value, s);
      localStorage.setItem('tp_has_password', 'true');
      await saveTrip(); await saveVersions(); await saveKeys();
      setupPw.value = ''; setupPw2.value = '';
      screen.value = 'app';
    }

    async function doUnlock() {
      if (!lockPw.value) { lockErr.value = '请输入密码'; return; }
      unlocking.value = true; lockErr.value = '';
      try {
        const s = b64ToArr(localStorage.getItem('tp_salt') || localStorage.getItem('bali_salt') || '');
        saltArr.value = s;
        const key = await deriveKey(lockPw.value, s);
        const tripRaw = localStorage.getItem('tp_trip_data') || localStorage.getItem('bali_trip_data');
        if (tripRaw) {
          const t = await decryptData(key, tripRaw);
          if (t.trips) {
            // Multi-trip format — ensure all trips have stable IDs
            t.trips.forEach(tr => { if (!tr.id) tr.id = crypto.randomUUID(); });
            trips.value = t.trips;
            activeTripIdx.value = t.activeIdx || 0;
            Object.assign(trip, JSON.parse(JSON.stringify(trips.value[activeTripIdx.value])));
          } else {
            // Legacy single-trip format — migrate with stable ID
            if (!t.id) t.id = crypto.randomUUID();
            Object.assign(trip, t);
            trips.value = [JSON.parse(JSON.stringify(trip))];
            activeTripIdx.value = 0;
          }
          if (trip.days.length) selDayId.value = trip.days[0].id;
        }
        const keysRaw = localStorage.getItem('tp_keys') || localStorage.getItem('bali_keys');
        if (keysRaw) Object.assign(keys, await decryptData(key, keysRaw));
        // Load per-trip versions, falling back to global legacy key
        const vKey = trip.id;
        const vRaw = localStorage.getItem(`tp_versions_${vKey}`) || localStorage.getItem('tp_versions') || localStorage.getItem('bali_versions');
        if (vRaw) versions.value = await decryptData(key, vRaw);
        masterKey.value = key;
        // Migrate legacy keys to new namespace
        if (localStorage.getItem('bali_has_password') && !localStorage.getItem('tp_has_password')) {
          localStorage.setItem('tp_has_password', 'true');
          localStorage.setItem('tp_salt', localStorage.getItem('bali_salt') || '');
          await saveTrip(); await saveKeys(); await saveVersions();
        }
        lockPw.value = '';
        provider.value = localStorage.getItem('tp_provider') || 'openai';
        model.value = localStorage.getItem('tp_model') || 'gpt-4o-mini';
        screen.value = 'app';
        await loadMessages();
      } catch(e) {
        lockErr.value = '密码错误，请重试';
      } finally { unlocking.value = false; }
    }

      if (!masterKey.value) return;

      if (!trip.id) trip.id = crypto.randomUUID();
      const vKey = trip.id;
      const raw = localStorage.getItem(`tp_versions_${vKey}`);
      if (raw) {
        try { versions.value = await decryptData(masterKey.value, raw); }
        catch { versions.value = []; }
      } else { versions.value = []; }

    async function saveMessages() {
      if (!masterKey.value) return;
      if (!trip.id) trip.id = crypto.randomUUID();
      // Save serializable message data (strip reactive/streaming flags)
      const toSave = messages.value.filter(m => !m.isStreaming).map(m => ({

        toolCalls: m.toolCalls || [], _skip: m._skip || false,
        _lastAssistant: m._lastAssistant, _toolResultMessages: m._toolResultMessages
      }));
      const msgKey = trip.id;
      localStorage.setItem(`tp_messages_${msgKey}`, await encryptData(masterKey.value, toSave));
    }

        const day = trip.days.find(d => d.id === dayId);
        if (!day) return { error:'Day not found' };
        if (date) day.date = date; if (title) day.title = title;
        trip.updatedAt = Date.now(); saveTrip(); return { success:true };
      },

      delete_day: ({ dayId }) => {
        const idx = trip.days.findIndex(d => d.id === dayId);
        if (idx === -1) return { error:'Day not found' };
        trip.days.splice(idx, 1);
        if (selDayId.value === dayId) selDayId.value = trip.days[0]?.id || '';
        trip.updatedAt = Date.now(); saveTrip(); return { success:true };
      },

      duplicate_day: ({ dayId, newDate }) => {
        const day = trip.days.find(d => d.id === dayId);
        if (!day) return { error:'Day not found' };
        const nd = JSON.parse(JSON.stringify(day));
        nd.id = genId(); nd.date = newDate;
        nd.activities = nd.activities.map(a => ({ ...a, id:genId() }));
        trip.days.push(nd); trip.days.sort((a,b) => a.date.localeCompare(b.date));
        trip.updatedAt = Date.now(); saveTrip(); return { success:true, dayId:nd.id };
      },

      reorder_day: ({ dayId, activityIds }) => {
        const day = trip.days.find(d => d.id === dayId);
        if (!day) return { error:'Day not found' };
        const map = Object.fromEntries(day.activities.map(a => [a.id, a]));
        day.activities = activityIds.map(id => map[id]).filter(Boolean);
        trip.updatedAt = Date.now(); saveTrip(); return { success:true };
      },

      add_activity: ({ dayId, time, endTime, type, name, address, notes, placeId, location, googleInfo, xiaohongshu, instagram, reservation }) => {
        const day = trip.days.find(d => d.id === dayId);
        if (!day) return { error:'Day not found' };
        const act = {
          id:genId(), time:time||'09:00', endTime:endTime||'', type:type||'attraction',
          name, address:address||'', notes:notes||'', placeId:placeId||'',
          location:location||null, googleInfo:googleInfo||null,
          xiaohongshu:xiaohongshu||null, instagram:instagram||null,
          reservation:reservation||{ required:false, links:[] }, travelFromPrev:null
        };
        day.activities.push(act);
        day.activities.sort((a,b) => a.time.localeCompare(b.time));
        trip.updatedAt = Date.now(); saveTrip(); return { success:true, activityId:act.id };
      },

      update_activity: ({ activityId, ...fields }) => {
        const found = findActivity(trip, activityId);
        if (!found) return { error:'Activity not found' };
        Object.assign(found.act, fields);
        trip.updatedAt = Date.now(); saveTrip(); return { success:true };
      },

      delete_activity: ({ activityId }) => {
        for (const day of trip.days) {
          const i = day.activities.findIndex(a => a.id === activityId);
          if (i !== -1) { day.activities.splice(i,1); trip.updatedAt = Date.now(); saveTrip(); return { success:true }; }
        }
        return { error:'Activity not found' };
      },

      move_activity: ({ activityId, targetDayId, insertAfterActivityId }) => {
        const found = findActivity(trip, activityId);
        if (!found) return { error:'Activity not found' };
        found.day.activities.splice(found.idx, 1);
        const tDay = trip.days.find(d => d.id === targetDayId);
        if (!tDay) return { error:'Target day not found' };
        if (insertAfterActivityId) {
          const ai = tDay.activities.findIndex(a => a.id === insertAfterActivityId);
          tDay.activities.splice(ai + 1, 0, found.act);
        } else {
          tDay.activities.push(found.act);
        }
        trip.updatedAt = Date.now(); saveTrip(); return { success:true };
      },

      batch_update: async ({ operations }) => {
        const res = [];
        for (const op of operations) {
          const h = TOOLS[op.tool];
          res.push(h ? (await h(op.params)) : { error:`Unknown: ${op.tool}` });
        }
        return { success:true, results:res };
      },

      calculate_route: async ({ fromActivityId, toActivityId, mode='driving' }) => {
        const from = findActivity(trip, fromActivityId);
        const to   = findActivity(trip, toActivityId);
        if (!from || !to) return { error:'Activity not found' };
        const durs = { driving:'15–30 分钟', walking:'30–60 分钟', transit:'20–40 分钟' };
        const dists = { driving:'5–15 km', walking:'1–3 km', transit:'5–15 km' };
        const route = { duration:durs[mode], distance:dists[mode], mode };
        to.act.travelFromPrev = route;
        trip.updatedAt = Date.now(); saveTrip(); return { success:true, route };
      },

      update_all_routes: async ({ dayId }) => {
        const day = trip.days.find(d => d.id === dayId);
        if (!day) return { error:'Day not found' };
        day.activities.slice(1).forEach(a => {
          a.travelFromPrev = { duration:'15–30 分钟', distance:'5–15 km', mode:'driving' };
        });
        trip.updatedAt = Date.now(); saveTrip(); return { success:true };
      },

      add_tip: ({ category, content }) => {
        const tip = { id:genId(), category, content };
        trip.tips.push(tip); trip.updatedAt = Date.now(); saveTrip();
        return { success:true, tipId:tip.id };
      },

      delete_tip: ({ tipId }) => {
        const i = trip.tips.findIndex(t => t.id === tipId);
        if (i === -1) return { error:'Tip not found' };
        trip.tips.splice(i,1); trip.updatedAt = Date.now(); saveTrip(); return { success:true };
      },

      save_version: ({ label }) => {
        const v = { id:genId(), label, timestamp:Date.now(), snapshot:JSON.parse(JSON.stringify(trip)) };
        versions.value.unshift(v);
        if (versions.value.length > 50) versions.value.length = 50;
        saveVersions(); return { success:true, versionId:v.id };
      },

      restore_version: ({ versionId }) => {
        const v = versions.value.find(x => x.id === versionId);
        if (!v) return { error:'Version not found' };
        Object.assign(trip, JSON.parse(JSON.stringify(v.snapshot)));
        trip.updatedAt = Date.now(); saveTrip(); return { success:true };
      },

      compare_versions: ({ versionId1, versionId2 }) => {
        const v1 = versions.value.find(x => x.id === versionId1);
        const v2 = versions.value.find(x => x.id === versionId2);
        if (!v1 || !v2) return { error:'Version not found' };
        return { success:true, comparison:{
          v1:{ label:v1.label, days:v1.snapshot.days.length, activities:v1.snapshot.days.reduce((s,d)=>s+d.activities.length,0) },
          v2:{ label:v2.label, days:v2.snapshot.days.length, activities:v2.snapshot.days.reduce((s,d)=>s+d.activities.length,0) }
        }};
      },

      get_versions: () => versions.value.map(v => ({ id:v.id, label:v.label, timestamp:v.timestamp, days:v.snapshot.days.length })),

      search_place: ({ query, location }) => ({
        success:true, query, location: location || trip.destination || '',
        note:'Using AI knowledge base. Configure Google Maps API for live data.',
        hint:`请根据"${query}"的知识提供详细地点信息，然后使用add_activity添加到行程`
      })
    };

    async function runTool(name, params) {
      const h = TOOLS[name];
      if (!h) throw new Error(`Unknown tool: ${name}`);
      return await h(params);
    }

    /* =====================================================
       AI STREAMING
    ===================================================== */
    async function* streamAI(msgs, provKey, mdl, key, doSearch) {
      const cfg = PROVIDERS[provKey];
      const body = { model:mdl, messages:msgs, stream:true, tools:AI_TOOLS, tool_choice:'auto' };

      if (doSearch) {
        if (cfg.webSearch === 'param') {
          if (provKey === 'kimi') body.enable_search = true;
          if (provKey === 'qwen') body.enable_search = true;
        } else if (cfg.webSearch === 'tool') {
          const searchTool = provKey === 'openai'
            ? { type:'web_search_preview' }
            : { type:'google_search' };
          body.tools = [...AI_TOOLS, searchTool];
        }
      }

      const ctrl = new AbortController();
      abortCtrl.value = ctrl;

      const resp = await fetch(cfg.endpoint, {
        method:'POST',
        headers:{ 'Content-Type':'application/json', 'Authorization':`Bearer ${key}` },
        body:JSON.stringify(body),
        signal:ctrl.signal
      });

      if (!resp.ok) {
        const errText = await resp.text();
        throw new Error(`HTTP ${resp.status}: ${errText}`);
      }

      const reader = resp.body.getReader();
      const dec = new TextDecoder();
      let buf = '';
      let tcMap = {};

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += dec.decode(value, { stream:true });
        const lines = buf.split('\n');
        buf = lines.pop() || '';

        for (const line of lines) {
          const t = line.trim();
          if (!t || t === 'data: [DONE]') continue;
          if (!t.startsWith('data: ')) continue;
          try {
            const d = JSON.parse(t.slice(6));
            const delta = d.choices?.[0]?.delta;
            if (!delta) continue;
            if (delta.content) yield { type:'text', content:delta.content };
            if (delta.tool_calls) {
              for (const tc of delta.tool_calls) {
                const i = tc.index ?? 0;
                if (!tcMap[i]) tcMap[i] = { id:tc.id||genId(), type:'function', function:{ name:'', arguments:'' } };
                if (tc.id) tcMap[i].id = tc.id;
                if (tc.function?.name) tcMap[i].function.name += tc.function.name;
                if (tc.function?.arguments) tcMap[i].function.arguments += tc.function.arguments;
              }
            }
          } catch {}
        }
      }
      const tcs = Object.values(tcMap);
      if (tcs.length) yield { type:'tool_calls', content:tcs };
      yield { type:'done' };
    }

    /* ---- Build message history ---- */
    function buildMsgs() {
      const out = [{ role:'system', content:SYS_PROMPT }];
      for (const m of messages.value) {
        if (m.role === 'user') {
          out.push({ role:'user', content:m.content });
        } else if (m.role === 'assistant') {
          if (m._toolResultMessages) {
            // Turn that ended with tool calls: push assistant msg + tool results
            if (m._lastAssistant) out.push(m._lastAssistant);
            out.push(...m._toolResultMessages);
          } else if (!m._skip && !m._continuation) {
            // Skip empty in-progress assistant messages
            if (!m.content && !m.toolCalls?.length && m.isStreaming) continue;
            const msg = { role:'assistant', content:m.content || null };
            if (m.toolCalls?.length) {
              msg.tool_calls = m.toolCalls.map(tc => ({
                id:tc.id, type:'function',
                function:{ name:tc.function.name, arguments:tc.function.arguments }
              }));
            }
            out.push(msg);
          }
        }
      }
      return out;
    }

    function handleEnter(e) {
      if (e.isComposing || e.keyCode === 229) return; // IME composing, ignore
      if (e.shiftKey) return; // Shift+Enter = newline, let browser handle
      e.preventDefault();
      sendMessage();
    }

    async function sendMessage() {
      const txt = chatInput.value.trim();
      if (!txt || chatting.value) return;
      if (!navigator.onLine) {
        toast('当前处于离线状态，无法使用 AI', 'error'); return;
      }
      if (!apiKey.value) {
        toast('请在设置中配置 ' + pCfg.value.name + ' API Key', 'error');
        activeTab.value = 'more'; return;
      }
      chatInput.value = '';
      // Reset textarea height
      if (chatInputEl.value) { chatInputEl.value.style.height = 'auto'; }
      chatting.value = true;
      messages.value.push({ role:'user', content:txt, timestamp:Date.now() });
      const aMsg = reactive({ role:'assistant', content:'', timestamp:Date.now(), toolCalls:[], isStreaming:true });
      messages.value.push(aMsg);
      scrollBottom();

      try {
        await doConversation(aMsg, 0);
      } catch(e) {
        if (e.name !== 'AbortError') {
          aMsg.content += (aMsg.content ? '\n\n' : '') + '❌ 错误: ' + e.message;
        } else {
          aMsg.content += aMsg.content ? ' [已停止]' : '[已停止]';
        }
      } finally {
        aMsg.isStreaming = false;
        chatting.value = false;
        abortCtrl.value = null;
        scrollBottom();
        await saveTrip();
        await saveMessages();
      }
    }

    async function doConversation(aMsg, depth) {
      if (depth > 8) return;

      const stream = streamAI(buildMsgs(), provider.value, model.value, apiKey.value, webSearch.value);
      let text = ''; let tcs = [];

      for await (const chunk of stream) {
        if (chunk.type === 'text') {
          text += chunk.content;
          aMsg.content = text;
          scrollBottom();
        } else if (chunk.type === 'tool_calls') {
          tcs = chunk.content;
          aMsg.toolCalls = tcs;
        }
      }

      if (!tcs.length) return;

      // Execute tools
      const toolResults = [];
      for (const tc of tcs) {
        const name = tc.function.name;
        let params = {};
        try { params = JSON.parse(tc.function.arguments || '{}'); } catch {}

        if (MUTATING_TOOLS.has(name) && depth === 0) {
          try { await TOOLS.save_version({ label:`AI操作前—${name}` }); } catch {}
        }

        let result;
        try { result = await runTool(name, params); }
        catch(e) { result = { error: e.message }; }

        toolResults.push({ id:tc.id, name, result });
        toast(`${name}`, 'info', 1500);
      }

      // Record this turn's tool calls for message history reconstruction
      aMsg._lastAssistant = {
        role:'assistant', content:text || null,
        tool_calls: tcs.map(tc => ({
          id:tc.id, type:'function',
          function:{ name:tc.function.name, arguments:tc.function.arguments }
        }))
      };
      aMsg._toolResultMessages = toolResults.map(tr => ({
        role:'tool', tool_call_id:tr.id, content:JSON.stringify(tr.result)
      }));
      aMsg._skip = true; // This message is now handled via _lastAssistant/_toolResultMessages

      // New assistant message for continuation
      const nextMsg = reactive({
        role:'assistant', content:'', timestamp:Date.now(),
        toolCalls:[], isStreaming:true, _continuation:true
      });
      messages.value.push(nextMsg);

      await doConversation(nextMsg, depth + 1);

      // Clean up empty continuation messages
      if (!nextMsg.content && !nextMsg.toolCalls?.length && !nextMsg._toolResultMessages) {
        const i = messages.value.indexOf(nextMsg);
        if (i !== -1) messages.value.splice(i, 1);
      } else {
        nextMsg._continuation = false;
      }
    }

    /* =====================================================
       MAP
    ===================================================== */
    function getSmartCenter() {
      // 1. If current day has activities with locations, use their center
      const day = selDay.value;
      if (day) {
        const locs = day.activities.filter(a => a.location).map(a => a.location);
        if (locs.length) {
          const lat = locs.reduce((s, l) => s + l.lat, 0) / locs.length;
          const lng = locs.reduce((s, l) => s + l.lng, 0) / locs.length;
          return { center: { lat, lng }, zoom: 12 };
        }
      }
      // 2. Any day with locations
      for (const d of trip.days) {
        const locs = d.activities.filter(a => a.location).map(a => a.location);
        if (locs.length) {
          const lat = locs.reduce((s, l) => s + l.lat, 0) / locs.length;
          const lng = locs.reduce((s, l) => s + l.lng, 0) / locs.length;
          return { center: { lat, lng }, zoom: 11 };
        }
      }
      // 3. User geolocation
      if (userLoc.value) return { center: userLoc.value, zoom: 12 };
      // 4. World view
      return { center: { lat: 20, lng: 0 }, zoom: 2 };
    }

    function requestUserLocation() {
      if (!navigator.geolocation) return;
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          userLoc.value = { lat: pos.coords.latitude, lng: pos.coords.longitude };
          if (mapInst && userLoc.value) showUserLocationMarker();
          // If map is at world view, recenter
          if (mapInst && mapInst.getZoom() <= 3) {
            mapInst.setCenter(userLoc.value);
            mapInst.setZoom(12);
          }
        },
        () => {}, // silently ignore denial
        { enableHighAccuracy: false, timeout: 8000 }
      );
    }

    function showUserLocationMarker() {
      if (!mapInst || !userLoc.value || !window.google) return;
      if (userLocMarker) userLocMarker.setPosition(userLoc.value);
      else {
        userLocMarker = new window.google.maps.Marker({
          position: userLoc.value, map: mapInst, title: '我的位置',
          icon: {
            path: window.google.maps.SymbolPath.CIRCLE,
            fillColor: '#4285F4', fillOpacity: 1,
            strokeColor: '#fff', strokeWeight: 3, scale: 8
          }, zIndex: 999
        });
      }
    }

    async function initMap() {
      if (!keys.maps) { mapErr.value = '请在设置中添加 Google Maps API Key'; return; }
      if (mapReady.value || window.__tpMapLoading) return;
      window.__tpMapLoading = true;
      requestUserLocation();
      window.__tpMapInit = () => { mapReady.value = true; nextTick(() => renderMap()); };
      const s = document.createElement('script');
      s.src = `https://maps.googleapis.com/maps/api/js?key=${keys.maps}&libraries=places&callback=__tpMapInit`;
      s.onerror = () => { mapErr.value = '地图加载失败，请检查 API Key'; window.__tpMapLoading = false; };
      document.head.appendChild(s);
    }

    function renderMap() {
      const c = document.getElementById('map-canvas');
      if (!c || !window.google) return;
      if (!mapInst) {
        const { center, zoom } = getSmartCenter();
        mapInst = new window.google.maps.Map(c, {
          center, zoom,
          mapTypeControl:false, streetViewControl:false, fullscreenControl:false,
          styles: dark.value ? DARK_MAP : []
        });
        mapInfoWin = new window.google.maps.InfoWindow();
        if (userLoc.value) showUserLocationMarker();
      }
      mapMarkers.forEach(m => m.setMap(null)); mapMarkers = [];
      mapPolylines.forEach(p => p.setMap(null)); mapPolylines = [];

      const day = selDay.value;
      if (!day) return;
      const acts = day.activities.filter(a => a.location);
      const numLabels = ['①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩'];
      acts.forEach((a, i) => {
        const m = TYPE_META[a.type];
        const mk = new window.google.maps.Marker({
          position:a.location, map:mapInst,
          label:{ text: numLabels[i] || `${i+1}`, color:'white', fontWeight:'bold', fontSize:'13px' },
          title:a.name,
          icon:{
            path:window.google.maps.SymbolPath.CIRCLE,
            fillColor:m.color, fillOpacity:1,
            strokeColor:'#fff', strokeWeight:2.5, scale:20
          }
        });
        mk.addListener('click', () => {
          mapDetailAct.value = a;
        });
        mapMarkers.push(mk);
      });
      for (let i = 1; i < acts.length; i++) {
        mapPolylines.push(new window.google.maps.Polyline({
          path:[acts[i-1].location, acts[i].location],
          geodesic:true, strokeColor:'#6366F1', strokeOpacity:0.7, strokeWeight:2.5, map:mapInst
        }));
      }
      if (acts.length) {
        const b = new window.google.maps.LatLngBounds();
        acts.forEach(a => b.extend(a.location));
        mapInst.fitBounds(b, { top:60, right:20, bottom:20, left:20 });
      }
    }

    watch(selDayId, () => { if (mapReady.value) nextTick(() => renderMap()); });
    watch(activeTab, t => { if (t === 'map') nextTick(() => { if (!mapReady.value) initMap(); else renderMap(); }); });

    async function doChangePw() {
      if (newPw.value.length < 4) { toast('密码至少4位', 'error'); return; }
      if (newPw.value !== newPw2.value) { toast('两次密码不一致', 'error'); return; }
      const oldKey = masterKey.value;
      const key = await deriveKey(newPw.value, saltArr.value);
      masterKey.value = key;
      // Re-encrypt active trip data + keys
      await saveTrip(); await saveVersions(); await saveKeys(); await saveMessages();
      // Re-encrypt per-trip messages & versions for non-active trips
      for (let i = 0; i < trips.value.length; i++) {
        if (i === activeTripIdx.value) continue;
        const tid = trips.value[i].id;
        // Re-encrypt messages
        const mRaw = localStorage.getItem(`tp_messages_${tid}`);
        if (mRaw) {
          try {
            const mData = await decryptData(oldKey, mRaw);
            localStorage.setItem(`tp_messages_${tid}`, await encryptData(key, mData));
          } catch {}
        }
        // Re-encrypt versions
        const vRaw = localStorage.getItem(`tp_versions_${tid}`);
        if (vRaw) {
          try {
            const vData = await decryptData(oldKey, vRaw);
            localStorage.setItem(`tp_versions_${tid}`, await encryptData(key, vData));
          } catch {}
        }
      }
      newPw.value = ''; newPw2.value = ''; showChgPw.value = false;
      toast('密码已修改', 'success');
    }

    function exportJSON() {
      const blob = new Blob([JSON.stringify(trip, null, 2)], { type:'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.download = `trip-${(trip.name||'export').replace(/\s+/g,'-')}-${new Date().toISOString().slice(0,10).replace(/-/g,'')}.json`;
      a.href = url; a.click(); URL.revokeObjectURL(url);
      toast('行程已导出', 'success');
    }

    function importJSON(e) {
      const f = e.target.files[0]; if (!f) return;
      const r = new FileReader();
      r.onload = async (ev) => {
        try {
          const data = JSON.parse(ev.target.result);
          await TOOLS.save_version({ label:'导入前备份' });
          if (!data.id) data.id = crypto.randomUUID();
          Object.assign(trip, data);
          await saveTrip();
          if (trip.days.length) selDayId.value = trip.days[0].id;
          toast('行程已导入', 'success');
        } catch(err) { toast('导入失败: ' + err.message, 'error'); }
      };
      r.readAsText(f); e.target.value = '';
    }

    function selectProv(p) {
      provider.value = p;
      const def = PROVIDERS[p].models.find(m => m.def);
      model.value = def?.id || PROVIDERS[p].models[0].id;
      localStorage.setItem('tp_provider', p);
      localStorage.setItem('tp_model', model.value);
      showProv.value = false; showMdl.value = false;

<transition name="slide-up">
  <div v-if="mapDetailAct" class="fixed inset-0 z-50 flex items-end">
    <div class="absolute inset-0 bg-black/40" @click="mapDetailAct = null"></div>
    <div :class="['relative w-full rounded-t-3xl max-h-[70vh] flex flex-col', isDark ? 'bg-[#000]' : 'bg-white']">
      <div class="flex justify-center pt-3 pb-1 flex-shrink-0">
        <div :class="['w-10 h-1 rounded-full', isDark ? 'bg-gray-700' : 'bg-gray-200']"></div>
      </div>
      <div :class="['px-5 py-3 border-b flex-shrink-0 flex items-start gap-3', isDark ? 'border-[#2e2e2e]' : 'border-[#d9d9d9]']">
        <div class="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0"
          :style="{ background: TYPE_META[mapDetailAct.type]?.bg, color: TYPE_META[mapDetailAct.type]?.color }">
          <span class="w-5 h-5" v-html="TYPE_META[mapDetailAct.type]?.icon"></span>
        </div>
        <div class="flex-1 min-w-0">
          <h3 class="font-semibold text-[15px]">{{ mapDetailAct.name }}</h3>
          <p :class="['text-[12px] mt-0.5', isDark ? 'text-[#6b6b6b]' : 'text-[#9b9b9b]']">
            {{ mapDetailAct.time }}{{ mapDetailAct.endTime ? ' – ' + mapDetailAct.endTime : '' }}
            <span v-if="mapDetailAct.address"> · {{ mapDetailAct.address }}</span>
          </p>
        </div>
        <button @click="mapDetailAct = null" :class="['w-8 h-8 rounded-full flex items-center justify-center text-sm flex-shrink-0', isDark ? 'bg-[#1a1a1a] text-gray-300' : 'bg-[#f4f4f5] text-gray-600']">✕</button>
      </div>
      <div class="flex-1 scroll-y px-5 py-4 space-y-3 pb-8">
        <p v-if="mapDetailAct.notes" :class="['text-[13px] leading-relaxed', isDark ? 'text-gray-300' : 'text-[#1a1a1a]']">{{ mapDetailAct.notes }}</p>

        <!-- Google info -->
        <div v-if="mapDetailAct.googleInfo" :class="['rounded-xl p-3 text-[12px] space-y-1.5', isDark ? 'bg-[#111]' : 'bg-[#f4f4f5]']">
          <div class="font-semibold text-[11px] uppercase tracking-wide text-[#10a37f]">Google 信息</div>
          <div v-if="mapDetailAct.googleInfo.rating" class="flex gap-3 items-center flex-wrap">
            <span class="flex items-center gap-0.5 text-amber-500"><span class="w-3 h-3" v-html="SVG.star"></span> {{ mapDetailAct.googleInfo.rating }}/5</span>
            <span v-if="mapDetailAct.googleInfo.reviewCount" :class="isDark ? 'text-gray-400' : 'text-gray-500'">{{ mapDetailAct.googleInfo.reviewCount }} 条评价</span>
          </div>
          <div v-if="mapDetailAct.googleInfo.hours" :class="isDark ? 'text-gray-400' : 'text-gray-500'">{{ mapDetailAct.googleInfo.hours }}</div>
          <div v-if="mapDetailAct.googleInfo.phone" :class="isDark ? 'text-gray-400' : 'text-gray-600'">{{ mapDetailAct.googleInfo.phone }}</div>
          <a v-if="mapDetailAct.googleInfo.website" :href="mapDetailAct.googleInfo.website" target="_blank" class="text-[#10a37f] underline">官网</a>
        </div>

        <!-- Xiaohongshu -->
        <div v-if="mapDetailAct.xiaohongshu" :class="['rounded-xl p-3 text-[12px] space-y-2', isDark ? 'bg-[#111]' : 'bg-[#FFF1F2]']">
          <div class="font-semibold text-[11px] uppercase tracking-wide text-rose-500">小红书推荐</div>
          <p v-if="mapDetailAct.xiaohongshu.summary" :class="['leading-relaxed', isDark ? 'text-gray-300' : 'text-gray-700']">{{ mapDetailAct.xiaohongshu.summary }}</p>
          <div v-if="mapDetailAct.xiaohongshu.highlights?.length" class="flex flex-wrap gap-1.5">
            <span v-for="h in mapDetailAct.xiaohongshu.highlights" :key="h" :class="['px-2 py-0.5 rounded-full text-[11px]', isDark ? 'bg-rose-900/30 text-rose-300' : 'bg-rose-50 text-rose-600']">{{ h }}</span>
          </div>
        </div>

        <!-- Instagram -->
        <div v-if="mapDetailAct.instagram" :class="['rounded-xl p-3 text-[12px] space-y-2', isDark ? 'bg-[#111]' : 'bg-[#FDF4FF]']">
          <div class="font-semibold text-[11px] uppercase tracking-wide text-purple-500">Instagram</div>
          <p v-if="mapDetailAct.instagram.summary" :class="['leading-relaxed', isDark ? 'text-gray-300' : 'text-gray-700']">{{ mapDetailAct.instagram.summary }}</p>
          <div v-if="mapDetailAct.instagram.hashtags?.length" class="flex flex-wrap gap-1.5">
            <span v-for="tag in mapDetailAct.instagram.hashtags" :key="tag" :class="['px-2 py-0.5 rounded-full text-[11px]', isDark ? 'bg-purple-900/30 text-purple-300' : 'bg-purple-50 text-purple-600']">#{{ tag }}</span>
          </div>
        </div>

        <!-- Reservation -->
        <div v-if="mapDetailAct.reservation?.required" :class="['rounded-xl p-3 text-[12px]', isDark ? 'bg-[#111]' : 'bg-[#FFF7ED]']">
          <div class="font-semibold text-[11px] uppercase tracking-wide text-orange-500 mb-1.5">预订信息</div>
          <div v-if="mapDetailAct.reservation.urgency" class="text-orange-500">{{ mapDetailAct.reservation.urgency }}</div>
          <div v-if="mapDetailAct.reservation.tip" :class="['mt-1.5 leading-relaxed', isDark ? 'text-gray-300' : 'text-gray-700']">{{ mapDetailAct.reservation.tip }}</div>
          <div v-if="mapDetailAct.reservation.links?.length" class="flex gap-2 mt-2 flex-wrap">
            <a v-for="l in mapDetailAct.reservation.links" :key="l.url || l" :href="l.url || l" target="_blank"
              class="text-[#10a37f] underline text-[12px]">{{ l.platform || l }}</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</transition>

<!-- A2HS Banner -->
<transition name="slide-up">
  <div v-if="showA2HS" class="fixed bottom-20 inset-x-4 z-[55] rounded-2xl shadow-2xl border overflow-hidden"
    :class="isDark ? 'bg-[#1a1a1a] border-gray-700' : 'bg-white border-gray-100'">
    <div class="px-4 py-3.5 flex items-center gap-3">
      <span class="w-8 h-8 flex-shrink-0 text-[#10a37f]" v-html="SVG.palm"></span>
      <div class="flex-1 min-w-0">
        <p class="font-semibold text-[13px]">添加到主屏幕</p>
        <p :class="['text-[11px] mt-0.5 leading-relaxed', isDark ? 'text-gray-400' : 'text-gray-500']">
          获得全屏体验，像原生 App 一样使用
        </p>
      </div>
      <div class="flex gap-2 flex-shrink-0">
        <button @click="dismissA2HS" :class="['px-3 py-1.5 rounded-xl text-[12px] font-medium press-sm', isDark ? 'text-gray-400' : 'text-gray-500']">忽略</button>
        <button @click="installPWA" class="px-3 py-1.5 rounded-xl bg-[#10a37f] text-white text-[12px] font-medium press-sm">安装</button>
      </div>
    </div>
  </div>
</transition>

<!-- Toast stack -->
<div class="fixed bottom-24 inset-x-0 flex flex-col items-center gap-2 z-[60] pointer-events-none px-4">
  <transition-group name="toast">
    <div v-for="t in toasts" :key="t.id"
      :class="['px-4 py-2.5 rounded-full text-[13px] font-medium shadow-xl max-w-xs text-center',
        t.type === 'error' ? 'bg-red-500 text-white' :
        t.type === 'success' ? 'bg-emerald-500 text-white' :
        'bg-gray-900 text-white dark:bg-gray-800']">
      {{ t.msg }}
    </div>
  </transition-group>
</div>

</div>
  `
};

createApp(App).mount('#app');
</script>
</body>
</html>
